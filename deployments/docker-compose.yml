version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ngoogle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ngoogle
      POSTGRES_PASSWORD: ngoogle
      POSTGRES_DB: ngoogle
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngoogle"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ngoogle

  master:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.master
    container_name: ngoogle-master
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MASTER_ADDR: ":8080"
      MASTER_URL: "http://master:8080"
      DB_DRIVER: "postgres"
      PG_DSN: "postgres://ngoogle:ngoogle@postgres:5432/ngoogle?sslmode=disable"
      AGENT_BIN_PATH: ""
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ngoogle

  agent:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.agent
    container_name: ngoogle-agent-1
    restart: unless-stopped
    depends_on:
      master:
        condition: service_healthy
    environment:
      MASTER_URL: "http://master:8080"
      AGENT_HOST_IP: "agent-1"
    networks:
      - ngoogle
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pg-data:
    driver: local

networks:
  ngoogle:
    driver: bridge
